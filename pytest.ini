[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q

[coverage:run]
omit =
    custom_components/indeklima/sensor.py
    custom_components/indeklima/config_flow.py
    custom_components/indeklima/panel.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if TYPE_CHECKING:
